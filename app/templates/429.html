<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Too Many Login Attempts</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>

<body class="error-page">
    <div class="error-container">
        <h1 class="error-title">Are you OK?</h1>
        <p class="error-message">You've made too many failed login attempts.</p>
        <p class="error-message">Please wait a few minutes before trying again.</p>
        <a href="{{ url_for('login') }}" class="error-button">
            Back to Login
        </a>
    </div>
</body>

</html>
